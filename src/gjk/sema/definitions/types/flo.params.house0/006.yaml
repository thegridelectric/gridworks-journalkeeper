x-gridworks:
  owner: "gridworks-energy"
  extended_description: >
    A LeafTransactiveNode builds a flo.params.house0 each market slot to drive
    its Forward Looking Optimization. FLO models the home's heat pump and
    thermal storage over HorizonHours, searches for the lowest-cost operating
    plan against the price and weather forecasts, and from that plan derives
    the price-quantity curve the node submits as its market bid.

    The parameters fall into groups: identity and timing (GNodeAlias,
    FloParamsUid, TimezoneStr, StartUnixS, ParamsGeneratedS); horizon and
    storage geometry (HorizonHours, NumLayers, StorageVolumeGallons,
    StorageLossesPercent); heat pump characteristics (HpMinElecKw, HpMaxElecKw,
    MaxHpKwhTh, MaxLoadKwhTh, HpTurnOnMinutes, HpIsOff, and the Cop terms); the
    initial thermal state (the InitialTemp and InitialThermocline fields,
    BufferAvailableKwh, HouseAvailableKwh); the forecasts and their provenance
    ids; the House0 thermal-response coefficients and operating points
    (Alpha/Beta/Gamma, ConstantDeltaT, the Intermediate and Dd fields,
    MaxEwtF); and the cost-function penalty terms. Several coefficients are
    carried as scaled integers to keep the serialized contract free of
    floating point representation.

    Version 006 reworks the penalty model. The version-005 Stability fields
    (StabilityWeight, StabilityDecay, StabilityThresholdKwh,
    StabilityHorizonHours) are renamed to StabilityPenalty* and joined by a new
    required-source-water-temperature penalty family (RswtPenaltyWeight,
    RswtPenaltyDecay, RswtPenaltyExponentRate, RswtPenaltyDecayMaxHour). Each
    penalty has an explicit enable flag (RswtPenaltyEnabled,
    StabilityPenaltyEnabled). The RSWT penalty discourages plans that require a
    high source water temperature, which the heat pump serves less
    efficiently. MaxHpKwhTh and MaxLoadKwhTh bound the per-step heat pump
    output and house load. PreviousPlanHpKwhElList and
    PreviousEstimateStorageKwhNow remain optional and supply the reference
    plan for the stability penalty; they are absent on the first run. The
    SCADA codebase has emitted version 006 in a single, stable shape.
