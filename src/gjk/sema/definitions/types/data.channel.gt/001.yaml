$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "https://schemas.electricity.works/types/data.channel.gt/001"

title: "data.channel.gt"
type: object
description: >
  Canonical definition of a telemetry channel representing directly
  captured measurements within a GridWorks system.

  A data.channel.gt declares the semantic identity of a telemetry stream,
  including what is measured, which node it describes, and which node
  captures the measurement. To interpret a channel.readings instance,
  consumers SHALL resolve ChannelName against the channel definitions
  for the relevant terminal asset / SCADA context (typically by matching
  data.channel.gt.Name).

properties:

  Name:
    $ref: "https://schemas.electricity.works/formats/spaceheat.name"
    description: >
      Short identifier of the channel within the context of a SCADA or
      terminal asset configuration.

  DisplayName:
    type: string
    description: >
      Human-readable name for display and UI purposes.

  AboutNodeName:
    $ref: "https://schemas.electricity.works/formats/spaceheat.name"
    description: >
      Name of the node whose state or behavior this channel describes.

  CapturedByNodeName:
    $ref: "https://schemas.electricity.works/formats/spaceheat.name"
    description: >
      Name of the node responsible for observing and reporting this telemetry.

  TelemetryName:
    $ref: "https://schemas.electricity.works/enums/spaceheat.telemetry.name/006"
    description: >
      Semantic category of measurement represented by this channel.

  TerminalAssetAlias:
    $ref: "https://schemas.electricity.works/formats/left.right.dot"
    description: >
      Canonical alias of the terminal asset within which this channel exists.

  InPowerMetering:
    type: boolean
    description: >
      Indicates whether this channel participates in power metering calculations.
      If true, TelemetryName SHALL equal PowerW.

  StartS:
    $ref: "https://schemas.electricity.works/formats/utc.seconds"
    description: >
      Optional timestamp indicating when this channel became active or valid.
      Interpretation of this value is implementation-specific.

  Id:
    $ref: "https://schemas.electricity.works/formats/uuid4.str"
    description: >
      Globally unique identifier for this channel definition.

  TypeName:
    const: "data.channel.gt"

  Version:
    const: "001"

required:
  - Name
  - DisplayName
  - AboutNodeName
  - CapturedByNodeName
  - TelemetryName
  - TerminalAssetAlias
  - Id
  - TypeName
  - Version

additionalProperties: false

examples:
  - |
    {
      "Name": "primary-flow",
      "DisplayName": "Primary Flow Gpm X 100",
      "AboutNodeName": "primary-flow",
      "CapturedByNodeName": "primary-btu",
      "TelemetryName": "GpmTimes100",
      "TerminalAssetAlias": "hw1.isone.me.versant.keene.beech.ta",
      "Id": "9c33d7af-59e0-415b-8208-ecf64916a64b",
      "TypeName": "data.channel.gt",
      "Version": "001"
    }

x-gridworks:
  owner: "gridworks-energy"

  axioms:
    - number: 1
      name: "PowerMeteringConstraint"
      statement: >
        If InPowerMetering is true, TelemetryName SHALL equal PowerW.

  extended_description: >
    data.channel.gt defines primary telemetry channels corresponding to
    directly observed measurements from physical devices or sensors.

    In contrast, derived.channel.gt defines computed channels whose values
    are produced from one or more input channels according to a declared
    strategy.

    Telemetry is transported using channel.readings, which includes a
    ChannelName and aligned lists of values and timestamps. channel.readings
    does not carry the full channel definition; consumers interpret
    channel.readings by resolving ChannelName against the channel definition
    set for the relevant SCADA / terminal asset context (data.channel.gt and
    derived.channel.gt), typically by Name equality.

    report messages aggregate channel.readings (ChannelReadingList) along
    with state transitions and FSM outputs for transmission from SCADA nodes
    associated with terminal assets.
