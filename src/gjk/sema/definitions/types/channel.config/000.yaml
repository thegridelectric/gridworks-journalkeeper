$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "https://schemas.electricity.works/types/channel.config/000"

title: "channel.config"
type: object
description: >
  Base channel configuration used by component definitions to describe how a
  telemetry channel is sampled, scaled, and serialized.

properties:
  ChannelName:
    $ref: "https://schemas.electricity.works/formats/spaceheat.name"

  PollPeriodMs:
    $ref: "https://schemas.electricity.works/formats/positive.int"
    description: >
      How often SCADA polls the underlying hardware device or source for a
      fresh value, in milliseconds. This applies to devices that do not emit
      readings on their own and must instead be queried by SCADA.

  CapturePeriodS:
    $ref: "https://schemas.electricity.works/formats/positive.int"
    description: >
      How often SCADA reports or emits the channel value into the telemetry
      stream, in seconds. This is distinct from hardware polling cadence.

  AsyncCapture:
    type: boolean

  AsyncCaptureDelta:
    $ref: "https://schemas.electricity.works/formats/positive.int"
    description: >
      Optional threshold for asynchronous emission. If present, an async
      capture is triggered when the magnitude of the change since the last
      published value is greater than or equal to AsyncCaptureDelta, expressed
      in Unit-scaled values.
    

  Exponent:
    type: integer
    description: >
      Base-10 scaling exponent applied to the serialized integer reading in
      combination with Unit. For example, if Unit is Gpm and Exponent is 2,
      then a reading of 432 represents 4.32 Gpm.

  Unit:
    $ref: "https://schemas.electricity.works/enums/spaceheat.unit/001"

  TypeName:
    const: "channel.config"

  Version:
    const: "000"

required:
  - ChannelName
  - CapturePeriodS
  - AsyncCapture
  - Exponent
  - Unit
  - TypeName
  - Version

additionalProperties: false

x-gridworks:
  owner: "gridworks-energy"
  axioms:
    - number: 1
      name: "CaptureAndPollingConsistency"
      statement: >
        If PollPeriodMs is present, then CapturePeriodMs (CapturePeriodS *
        1000) SHALL be greater than PollPeriodMs. If CapturePeriodMs is less
        than 10 times PollPeriodMs, then CapturePeriodMs SHALL be a multiple
        of PollPeriodMs.
  extended_description: >
    `channel.config` captures both periodic sampling behavior and optional
    asynchronous emission behavior for a telemetry channel.

    `PollPeriodMs` and `CapturePeriodS` describe different stages of SCADA
    behavior. `PollPeriodMs` is the cadence at which SCADA polls the hardware
    device or upstream source for a value. `CapturePeriodS` is the cadence at
    which SCADA emits that channel value into the telemetry stream.

    These cadences may differ. For example, SCADA may poll a device frequently
    to maintain fresh local state while only reporting the value periodically
    or when an async trigger condition is met.

    In current runtime practice, `AsyncCapture` may be true even when
    `AsyncCaptureDelta` is omitted. This means asynchronous capture is enabled,
    but the threshold semantics are not fully specified in the payload itself.

    When `AsyncCaptureDelta` is present, the intended interpretation is:
    publish asynchronously when the magnitude of the change since the last
    published value is greater than or equal to `AsyncCaptureDelta`.

    `Exponent` describes how to interpret the serialized integer reading
    relative to `Unit`. For example, if `Unit` is `Gpm` and `Exponent` is `2`,
    then a reading value of `432` represents `4.32 Gpm`.

    A future published version may strengthen this contract by requiring
    `AsyncCaptureDelta` whenever `AsyncCapture` is true, once runtime behavior
    consistently provides that value.
