$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "https://schemas.electricity.works/types/report.event/003"

title: "report.event"
type: object
description: >
  Event wrapper for a report payload with message tracking metadata.

properties:
  MessageId:
    $ref: "https://schemas.electricity.works/formats/uuid4.str"

  TimeCreatedMs:
    $ref: "https://schemas.electricity.works/formats/utc.milliseconds"

  Src:
    $ref: "https://schemas.electricity.works/formats/left.right.dot"

  Report:
    $ref: "https://schemas.electricity.works/types/report/003"

  TypeName:
    const: "report.event"

  Version:
    const: "003"

required:
  - MessageId
  - TimeCreatedMs
  - Src
  - Report
  - TypeName
  - Version

additionalProperties: false

x-gridworks:
  owner: "gridworks-energy"

  axioms:
    - number: 3
      name: "ReportSourcePropagation"
      statement: >
        Src SHALL equal Report.FromGNodeAlias.
