$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "https://schemas.electricity.works/types/layout.lite/007"

title: "layout.lite"
type: object
description: >
  Runtime projection of the active SCADA context needed to interpret telemetry
  and snapshot messages for a running Spaceheat deployment.

  `layout.lite` is emitted by SCADA on request. It is not intended to be a
  lossless copy of the source layout artifact on disk. Some fields are projected
  directly from the loaded hardware layout, while others reflect active runtime
  settings.

properties:

  FromGNodeAlias:
    $ref: "https://schemas.electricity.works/formats/left.right.dot"
    description: >
      GNode alias of the SCADA actor publishing this runtime context.

  MessageCreatedMs:
    $ref: "https://schemas.electricity.works/formats/utc.milliseconds"
    description: >
      Timestamp at which this layout projection was created.

  MessageId:
    $ref: "https://schemas.electricity.works/formats/uuid4.str"
    description: >
      Unique identifier for this emitted layout projection.

  Strategy:
    type: string
    description: >
      Strategy / manifold variant name used by the running SCADA deployment.

  ZoneList:
    type: array
    items:
      type: string
    description: >
      Ordered list of zones known to the running deployment.

  CriticalZoneList:
    type: array
    items:
      type: string
    description: >
      Ordered list of critical zones. SHALL be a subset of ZoneList.

  TotalStoreTanks:
    $ref: "https://schemas.electricity.works/formats/positive.int"
    description: >
      Number of store tanks configured for this deployment.

  ShNodes:
    type: array
    items:
      $ref: "https://schemas.electricity.works/types/spaceheat.node.gt/200"
    description: >
      Spaceheat nodes available in the running SCADA context.

  DataChannels:
    type: array
    items:
      $ref: "https://schemas.electricity.works/types/data.channel.gt/001"
    description: >
      Raw telemetry channel definitions used to interpret channel names appearing
      in reports and snapshots.

  DerivedChannels:
    type: array
    items:
      $ref: "https://schemas.electricity.works/types/derived.channel.gt/000"
    description: >
      Derived telemetry channel definitions used to interpret derived channel
      names appearing in reports and snapshots.

  TankModuleComponents:
    type: array
    items:
      $ref: "https://schemas.electricity.works/types/pico.tank.module.component.gt/011"
    description: >
      Tank module components present in the running deployment.

  FlowModuleComponents:
    type: array
    items:
      $ref: "https://schemas.electricity.works/types/pico.flow.module.component.gt/000"
    description: >
      Flow module components present in the running deployment.

  Ha1Params:
    $ref: "https://schemas.electricity.works/types/ha1.params/004"
    description: >
      Active HA1 parameter set used by the running deployment.

  I2cRelayComponent:
    $ref: "https://schemas.electricity.works/types/i2c.multichannel.dt.relay.component.gt/002"
    description: >
      Relay component configuration used by the running deployment.

  TMap:
    $ref: "https://schemas.electricity.works/types/gw1.tank.temp.calibration.map/000"
    description: >
      Optional tank temperature calibration map emitted with the runtime context.

  TypeName:
    const: "layout.lite"

  Version:
    const: "007"

required:
  - FromGNodeAlias
  - MessageCreatedMs
  - MessageId
  - Strategy
  - ZoneList
  - CriticalZoneList
  - TotalStoreTanks
  - ShNodes
  - DataChannels
  - DerivedChannels
  - TankModuleComponents
  - FlowModuleComponents
  - Ha1Params
  - I2cRelayComponent
  - TypeName
  - Version

additionalProperties: false

x-gridworks:
  owner: "gridworks-energy"

  axioms:
    - number: 1
      name: "DcNodeConsistency"
      statement: >
        Every DataChannels.AboutNodeName and DataChannels.CapturedByNodeName
        SHALL reference an existing ShNodes.Name, and every captured-by node
        SHALL have an active ActorClass.

    - number: 2
      name: "NodeHandleHierarchyConsistency"
      statement: >
        Every ShNode with a dotted handle SHALL have its immediate boss present
        as another ShNode in the same payload.

    - number: 3
      name: "CriticalZoneSubset"
      statement: >
        CriticalZoneList SHALL be a subset of ZoneList.

  extended_description: >
    `layout.lite` is the SCADA-emitted semantic context for a running
    deployment. It exists so consumers can interpret compact runtime payloads
    that reference channels and nodes by name rather than embedding full
    definitions in every message.

    In particular, `report.event` and `snapshot.spaceheat` rely on
    `layout.lite` for channel interpretation. `ChannelName` references inside
    those messages SHALL be resolved against `DataChannels` and
    `DerivedChannels` in the relevant `layout.lite` context.

    `layout.lite` also carries selected runtime settings whose values affect
    the interpretation of the running system, including active HA1 parameters.
