$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "https://schemas.electricity.works/types/layout.lite/012"

title: "layout.lite"
type: object
description: >
  Runtime projection of the active SCADA context needed to interpret telemetry
  and snapshot messages for a running Spaceheat deployment.

  `layout.lite` is emitted by SCADA on request. It is not intended to be a
  lossless copy of the source layout artifact on disk. Some fields are projected
  directly from the loaded hardware layout, while others reflect active runtime
  settings.

properties:

  FromGNodeAlias:
    $ref: "https://schemas.electricity.works/formats/left.right.dot"
    description: >
      GNode alias of the SCADA actor publishing this runtime context.

  MessageCreatedMs:
    $ref: "https://schemas.electricity.works/formats/utc.milliseconds"
    description: >
      Timestamp at which this layout projection was created.

  MessageId:
    $ref: "https://schemas.electricity.works/formats/uuid4.str"
    description: >
      Unique identifier for this emitted layout projection.

  Strategy:
    type: string
    description: >
      Strategy / manifold variant name used by the running SCADA deployment.

  SystemMode:
    $ref: "https://schemas.electricity.works/enums/gw1.system.mode/000"
    description: >
      Active system mode for the running SCADA deployment.

  SeasonalStorageMode:
    $ref: "https://schemas.electricity.works/enums/gw1.seasonal.storage.mode/000"
    description: >
      Active seasonal storage mode for the running SCADA deployment.

  BufferShortCycling:
    type: boolean
    description: >
      Whether buffer short cycling behavior is enabled.

  ZoneList:
    type: array
    items:
      type: string
    description: >
      Ordered list of zones known to the running deployment.

  CriticalZoneList:
    type: array
    items:
      type: string
    description: >
      Ordered list of critical zones. SHALL be a subset of ZoneList.

  TotalStoreTanks:
    $ref: "https://schemas.electricity.works/formats/positive.int"
    description: >
      Number of store tanks configured for this deployment.

  ShNodes:
    type: array
    items:
      $ref: "https://schemas.electricity.works/types/spaceheat.node.gt/301"
    description: >
      Spaceheat nodes available in the running SCADA context.

  DataChannels:
    type: array
    items:
      $ref: "https://schemas.electricity.works/types/data.channel.gt/002"
    description: >
      Raw telemetry channel definitions used to interpret channel names appearing
      in reports and snapshots.

  DerivedChannels:
    type: array
    items:
      $ref: "https://schemas.electricity.works/types/derived.channel.gt/001"
    description: >
      Derived telemetry channel definitions used to interpret derived channel
      names appearing in reports and snapshots.

  TankModuleComponents:
    type: array
    items:
      oneOf:
        - $ref: "https://schemas.electricity.works/types/pico.tank.module.component.gt/011"
        - $ref: "https://schemas.electricity.works/types/sim.pico.tank.module.component.gt/000"
    description: >
      Tank module components present in the running deployment.

  FlowModuleComponents:
    type: array
    items:
      $ref: "https://schemas.electricity.works/types/pico.flow.module.component.gt/000"
    description: >
      Flow module components present in the running deployment.

  Ha1Params:
    $ref: "https://schemas.electricity.works/types/ha1.params/006"
    description: >
      Active HA1 parameter set used by the running deployment.

  I2cRelayComponent:
    $ref: "https://schemas.electricity.works/types/i2c.multichannel.dt.relay.component.gt/003"
    description: >
      Optional relay component configuration used by the running deployment.

  TMap:
    $ref: "https://schemas.electricity.works/types/gw1.tank.temp.calibration.map/000"
    description: >
      Optional tank temperature calibration map emitted with the runtime context.

  TypeName:
    const: "layout.lite"

  Version:
    const: "012"

required:
  - FromGNodeAlias
  - MessageCreatedMs
  - MessageId
  - Strategy
  - SystemMode
  - SeasonalStorageMode
  - BufferShortCycling
  - ZoneList
  - CriticalZoneList
  - TotalStoreTanks
  - ShNodes
  - DataChannels
  - DerivedChannels
  - TankModuleComponents
  - FlowModuleComponents
  - Ha1Params
  - TypeName
  - Version

additionalProperties: false

examples:
  - |
    {
      "FromGNodeAlias": "d1.isone.me.versant.keene.beech.scada",
      "MessageCreatedMs": 1704067200000,
      "MessageId": "9cff2689-eadc-4577-94ea-6d86d0d23e9e",
      "Strategy": "House0Sieg",
      "SystemMode": "Heating",
      "SeasonalStorageMode": "AllTanks",
      "BufferShortCycling": false,
      "ZoneList": [],
      "CriticalZoneList": [],
      "TotalStoreTanks": 3,
      "ShNodes": [
        {"Name": "s", "ActorClass": "PrimaryScada", "ShNodeId": "da9a0427-d6c0-44c0-b51c-492c1e580dc5", "TypeName": "spaceheat.node.gt", "Version": "301"}
      ],
      "DataChannels": [],
      "DerivedChannels": [],
      "TankModuleComponents": [],
      "FlowModuleComponents": [],
      "Ha1Params": {"AlphaTimes10": 120, "BetaTimes100": -22, "GammaEx6": 0, "IntermediatePowerKw": 1.5, "IntermediateRswtF": 100, "DdPowerKw": 9.0, "DdRswtF": 160, "DdDeltaTF": 20, "HpMaxKwEl": 5.0, "HpMaxKwTh": 6.0, "MaxEwtF": 170, "LoadOverestimationPercent": 10, "CopIntercept": 3.2, "CopOatCoeff": 0.02, "CopLwtCoeff": -0.01, "CopMin": 1.4, "CopMinOatF": -5.0, "HpTurnOnMinutes": 12, "TypeName": "ha1.params", "Version": "006"},
      "I2cRelayComponent": {"ComponentId": "25f344ee-39ea-4904-bff9-54f2022337af", "ComponentAttributeClassId": "29eab8b1-100f-4230-bb44-3a2fcba33cc3", "ConfigList": [{"ActorName": "relay1", "AsyncCapture": true, "CapturePeriodS": 300, "ChannelName": "vdc-relay1", "DeEnergizedState": "RelayClosed", "DeEnergizingEvent": "CloseRelay", "EnergizedState": "RelayOpen", "EnergizingEvent": "OpenRelay", "EventType": "change.relay.state", "Exponent": 0, "PollPeriodMs": 200, "RelayIdx": 1, "StateType": "relay.closed.or.open", "TypeName": "relay.actor.config", "Unit": "Unitless", "Version": "002", "WiringConfig": "NormallyClosed"}], "DisplayName": "I2C Relay Board", "HwUid": "i2c.krida.double.emr16.v1.29eab8", "I2cAddressList": [32, 33], "I2cBus": "primary-scada", "TypeName": "i2c.multichannel.dt.relay.component.gt", "Version": "003"},
      "TypeName": "layout.lite",
      "Version": "012"
