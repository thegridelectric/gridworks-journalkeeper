x-gridworks:
  owner: "gridworks-energy"

  axioms:
    - number: 1
      name: "DcNodeConsistency"
      statement: >
        Every DataChannels.AboutNodeName and DataChannels.CapturedByNodeName
        SHALL reference an existing ShNodes.Name, and every captured-by node
        SHALL have an active ActorClass.

    - number: 2
      name: "NodeHandleHierarchyConsistency"
      statement: >
        Every ShNode with a dotted handle SHALL have its immediate boss present
        as another ShNode in the same payload.

    - number: 3
      name: "CriticalZoneSubset"
      statement: >
        CriticalZoneList SHALL be a subset of ZoneList.

    - number: 4
      name: "DerivedNodeConsistency"
      statement: >
        Every DerivedChannels.CreatedByNodeName SHALL reference an existing
        ShNodes.Name whose ActorClass is active.

  extended_description: >
    `layout.lite` is the SCADA-emitted semantic context for a running
    deployment. It exists so consumers can interpret compact runtime payloads
    that reference channels and nodes by name rather than embedding full
    definitions in every message.

    In particular, `report.event` and `snapshot.spaceheat` rely on
    `layout.lite` for channel interpretation. `ChannelName` references inside
    those messages SHALL be resolved against `DataChannels` and
    `DerivedChannels` in the relevant `layout.lite` context.

    `layout.lite` also carries selected runtime settings whose values affect
    the interpretation of the running system, including system mode, seasonal
    storage mode, short-cycling behavior, and active HA1 parameters.
