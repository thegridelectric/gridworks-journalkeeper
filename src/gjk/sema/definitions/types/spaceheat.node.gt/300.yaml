$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "https://schemas.electricity.works/types/spaceheat.node.gt/300"

title: "spaceheat.node.gt"
type: object
description: >
  A Spaceheat node representing a named element in the SCADA system.

properties:
  Name:
    $ref: "https://schemas.electricity.works/formats/spaceheat.name"
    description: >
      Unique name identifying this node within the Spaceheat system. This name
      is used as the primary reference point for binding channels, actors, and
      control logic.

  ActorHierarchyName:
    $ref: "https://schemas.electricity.works/formats/handle.name"
    description: >
      Hierarchical name in the actor command tree. This is used when the node
      participates in structured actor control and command routing.

  Handle:
    $ref: "https://schemas.electricity.works/formats/handle.name"
    description: >
      Handle used for actor-to-actor communication. When present, this defines
      the addressable identity of the node within the actor messaging layer.

  ActorClass:
    $ref: "https://schemas.electricity.works/enums/gw1.actor.class/009"
    description: >
      Class of the software actor associated with this node. This determines
      the behavior, capabilities, and runtime role of the node within the SCADA.

  DisplayName:
    type: string
    description: >
      Human-readable display name for this node, intended for UI presentation
      and operator interaction.

  ComponentId:
    type: string
    description: >
      Identifier of the physical component associated with this node. This links
      the node to hardware defined elsewhere in the system.

  NameplatePowerW:
    $ref: "https://schemas.electricity.works/formats/positive.int"
    description: >
      Nameplate power rating in watts for this node, used for power estimation,
      metering, and system-level energy calculations.

  InPowerMetering:
    type: boolean
    description: >
      Indicates whether this node participates in power metering calculations.
      When true, NameplatePowerW is required.

  ShNodeId:
    $ref: "https://schemas.electricity.works/formats/uuid4.str"
    description: >
      Immutable unique identifier for this Spaceheat node. This identifier is
      stable across deployments and renaming.

  TypeName:
    const: "spaceheat.node.gt"

  Version:
    const: "300"

required:
  - Name
  - ActorClass
  - ShNodeId
  - TypeName
  - Version

additionalProperties: true

examples:
  - |
    {
      "Name": "relay1",
      "ActorHierarchyName": "s.relay1",
      "Handle": "auto.pico-cycler.relay1",
      "ActorClass": "Relay",
      "DisplayName": "5VDC Relay",
      "ComponentId": "25f344ee-39ea-4904-bff9-54f2022337af",
      "ShNodeId": "a7f4becc-8e35-4118-a3e9-ab6ad13f5a67",
      "TypeName": "spaceheat.node.gt",
      "Version": "300"
    }

x-gridworks:
  owner: "gridworks-energy"
  axioms:
    - number: 1
      name: "InPowerMeteringRequiresNameplate"
      statement: >
        If InPowerMetering is true, NameplatePowerW SHALL be present.

  extended_description: >
    Spaceheat nodes are the fundamental building blocks of an agent-based
    SCADA deployment for a hydronic heating system.

    Each node represents a named element in the operational control model.
    Nodes may correspond to active software actors responsible for sensing,
    control, telemetry generation, or coordination. They may also represent
    passive physical or logical entities that are measured or controlled, or
    higher-level semantic roles such as supervisory control, derived signals,
    or system modes.

    This abstraction unifies physical equipment, software actors, and logical
    constructs under a single naming system, enabling consistent binding across
    telemetry, control, and coordination layers.

    This type permits additionalProperties to support forward-compatible schema
    evolution and temporary inclusion of application-specific fields during
    layout development. Such extensions are expected to be formalized into
    explicit schema properties over time.
