$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "https://schemas.electricity.works/types/gw1.tank.temp.calibration.map/000"

title: "gw1.tank.temp.calibration.map"
type: object
description: >
  Buffer and per-tank calibration map for converting raw probe readings into
  calibrated temperatures.

properties:
  Buffer:
    $ref: "https://schemas.electricity.works/types/gw1.tank.temp.calibration/000"

  Tank:
    type: object
    propertyNames:
      $ref: "https://schemas.electricity.works/formats/positive.int.as.str"
    additionalProperties:
      $ref: "https://schemas.electricity.works/types/gw1.tank.temp.calibration/000"
    description: >
      Typed map of per-tank calibrations keyed by the string form of a
      positive tank index ("1", "2", ...). See `sema/spec/authoring/types.md`
      §Typed Maps.

  TypeName:
    const: "gw1.tank.temp.calibration.map"

  Version:
    const: "000"

required:
  - Buffer
  - Tank
  - TypeName
  - Version

additionalProperties: false

x-gridworks:
  owner: "gridworks-energy"
