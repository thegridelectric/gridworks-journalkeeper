$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "https://schemas.electricity.works/types/gw1.tank.temp.calibration.map/000"

title: "gw1.tank.temp.calibration.map"
type: object
description: >
  Buffer and per-tank calibration map for converting raw probe readings into
  calibrated temperatures.

properties:
  Buffer:
    $ref: "https://schemas.electricity.works/types/gw1.tank.temp.calibration/000"

  Tank:
    type: object
    propertyNames:
      pattern: "^[1-9][0-9]*$"
    additionalProperties:
      $ref: "https://schemas.electricity.works/types/gw1.tank.temp.calibration/000"

  TypeName:
    const: "gw1.tank.temp.calibration.map"

  Version:
    const: "000"

required:
  - Buffer
  - Tank
  - TypeName
  - Version

additionalProperties: false

x-gridworks:
  owner: "gridworks-energy"
  axioms:
    - number: 1
      name: "ContiguousTankIndexConstraint"
      statement: >
        Tank SHALL contain between 1 and 6 entries, and its keys SHALL be the
        contiguous integer strings starting at 1.
