$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "https://schemas.electricity.works/types/relay.actor.config/003"

title: "relay.actor.config"
type: object
description: >
  Configuration for a relay-backed Spaceheat actor associated with one relay
  on a multi-channel relay board.

  A relay.actor.config binds a specific relay index on a relay component to a
  named actor and declares the event/state semantics associated with energizing
  and de-energizing that relay. The config also carries the channel capture
  settings required to report the relay-controlled actor's state into the
  telemetry system.

properties:
  ChannelName:
    $ref: "https://schemas.electricity.works/formats/spaceheat.name"
    description: >
      Name of the telemetry channel associated with this relay actor.

  PollPeriodMs:
    $ref: "https://schemas.electricity.works/formats/positive.int"
    description: >
      Polling period in milliseconds used to check the relay state.

  CapturePeriodS:
    $ref: "https://schemas.electricity.works/formats/positive.int"
    description: >
      Period in seconds for periodic capture of the relay state channel.

  AsyncCapture:
    type: boolean
    description: >
      If true, state changes SHALL be captured asynchronously in addition to
      periodic capture.

  AsyncCaptureDelta:
    $ref: "https://schemas.electricity.works/formats/positive.int"
    description: >
      Minimum change required to trigger asynchronous capture. For relay-backed
      state channels this is typically 1.

  Exponent:
    type: integer
    description: >
      Base-10 exponent applied to the channel value representation.

  Unit:
    $ref: "https://schemas.electricity.works/enums/spaceheat.unit/001"
    description: >
      Unit associated with the channel represented by this relay actor config.

  RelayIdx:
    $ref: "https://schemas.electricity.works/formats/positive.int"
    description: >
      One-based relay index on the associated relay board component.

  ActorName:
    $ref: "https://schemas.electricity.works/formats/spaceheat.name"
    description: >
      Canonical Spaceheat node name of the actor controlled by this relay.

  WiringConfig:
    $ref: "https://schemas.electricity.works/enums/relay.wiring.config/000"
    description: >
      Wiring configuration of the relay contact arrangement used by this actor.

  EventType:
    $ref: "https://schemas.electricity.works/formats/left.right.dot"
    description: >
      Semantic event category emitted when the relay changes the controlled
      actor's state.

  DeEnergizingEvent:
    type: string
    minLength: 1
    description: >
      Event value associated with transition caused by relay de-energization.

  EnergizingEvent:
    type: string
    minLength: 1
    description: >
      Event value associated with transition caused by relay energization.

  StateType:
    $ref: "https://schemas.electricity.works/formats/left.right.dot"
    description: >
      Semantic state category controlled by this relay.

  DeEnergizedState:
    type: string
    minLength: 1
    description: >
      State value associated with the de-energized relay position.

  EnergizedState:
    type: string
    minLength: 1
    description: >
      State value associated with the energized relay position.

  TypeName:
    const: "relay.actor.config"

  Version:
    const: "003"

required:
  - ChannelName
  - CapturePeriodS
  - AsyncCapture
  - Exponent
  - Unit
  - RelayIdx
  - ActorName
  - WiringConfig
  - EventType
  - DeEnergizingEvent
  - EnergizingEvent
  - StateType
  - DeEnergizedState
  - EnergizedState
  - TypeName
  - Version

additionalProperties: false

examples:
  - |
    {
      "ActorName": "relay17",
      "AsyncCapture": true,
      "AsyncCaptureDelta": 1,
      "CapturePeriodS": 300,
      "ChannelName": "zone1-down-failsafe-relay17",
      "DeEnergizedState": "RelayClosed",
      "DeEnergizingEvent": "CloseRelay",
      "EnergizedState": "RelayOpen",
      "EnergizingEvent": "OpenRelay",
      "EventType": "change.relay.state",
      "Exponent": 0,
      "PollPeriodMs": 200,
      "RelayIdx": 17,
      "StateType": "relay.closed.or.open",
      "TypeName": "relay.actor.config",
      "Unit": "Unitless",
      "Version": "003",
      "WiringConfig": "NormallyClosed"
    }

x-gridworks:
  owner: "gridworks-energy"

  axioms:
    - number: 1
      name: "AsyncCaptureConsistency"
      statement: >
        If AsyncCapture is true, then AsyncCaptureDelta SHALL be present.

    - number: 2
      name: "CapturePollingConsistency"
      statement: >
        If PollPeriodMs is present, then CapturePeriodMs (CapturePeriodS *
        1000) SHALL be greater than PollPeriodMs. If CapturePeriodMs is less
        than 10 times PollPeriodMs, then CapturePeriodMs SHALL be a multiple
        of PollPeriodMs.

    - number: 3
      name: "RelayEventEnumConsistency"
      statement: >
        If EventType equals "change.relay.state", then DeEnergizingEvent and
        EnergizingEvent SHALL both be valid values of
        change.relay.state:000.

    - number: 4
      name: "RelayStateEnumConsistency"
      statement: >
        If StateType equals "relay.closed.or.open", then DeEnergizedState and
        EnergizedState SHALL both be valid values of
        relay.closed.or.open:000.

    - number: 5
      name: "RelayEventStateMatch"
      statement: >
        If EventType equals "change.relay.state" and StateType equals
        "relay.closed.or.open", then:

          - DeEnergizingEvent "CloseRelay" SHALL imply DeEnergizedState "RelayClosed"
          - DeEnergizingEvent "OpenRelay" SHALL imply DeEnergizedState "RelayOpen"
          - EnergizingEvent "CloseRelay" SHALL imply EnergizedState "RelayClosed"
          - EnergizingEvent "OpenRelay" SHALL imply EnergizedState "RelayOpen"

  extended_description: >
    relay.actor.config specializes generic channel capture configuration for
    relay-backed actors in hydronic control systems.

    This type binds one relay position on a relay board to a specific actor and
    declares the event/state semantics associated with switching that relay.
    These semantics are important for distributed coordination because
    different layouts may realize the same functional role using different
    underlying hardware node names while preserving identical actor-level
    meaning.

    In this registry, the declared relay event/state semantics are based on
    change.relay.state and relay.closed.or.open.
