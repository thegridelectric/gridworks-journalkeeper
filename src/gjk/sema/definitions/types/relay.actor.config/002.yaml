$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "https://schemas.electricity.works/types/relay.actor.config/002"

title: "relay.actor.config"
type: object
description: >
  Configuration for a relay-backed Spaceheat actor associated with one relay
  on a multi-channel relay board.

  A relay.actor.config binds a specific relay index on a relay component to a
  named actor and declares the event/state semantics associated with energizing
  and de-energizing that relay. The config also carries the channel capture
  settings required to report the relay-controlled actor's state into the
  telemetry system.

properties:
  ChannelName:
    $ref: "https://schemas.electricity.works/formats/spaceheat.name"
    description: >
      Name of the telemetry channel associated with this relay actor.

  PollPeriodMs:
    $ref: "https://schemas.electricity.works/formats/positive.int"
    description: >
      Polling period in milliseconds used to check the relay state.

  CapturePeriodS:
    $ref: "https://schemas.electricity.works/formats/positive.int"
    description: >
      Period in seconds for periodic capture of the relay state channel.

  AsyncCapture:
    type: boolean
    description: >
      If true, state changes SHALL be captured asynchronously in addition to
      periodic capture.

  AsyncCaptureDelta:
    $ref: "https://schemas.electricity.works/formats/positive.int"
    description: >
      Minimum change required to trigger asynchronous capture. For relay-backed
      state channels this is typically 1.

  Exponent:
    type: integer
    description: >
      Base-10 exponent applied to the channel value representation.

  Unit:
    $ref: "https://schemas.electricity.works/enums/spaceheat.unit/001"
    description: >
      Unit associated with the channel represented by this relay actor config.

  RelayIdx:
    $ref: "https://schemas.electricity.works/formats/positive.int"
    description: >
      One-based relay index on the associated relay board component.

  ActorName:
    $ref: "https://schemas.electricity.works/formats/spaceheat.name"
    description: >
      Canonical Spaceheat node name of the actor controlled by this relay.

  WiringConfig:
    $ref: "https://schemas.electricity.works/enums/relay.wiring.config/000"
    description: >
      Wiring configuration of the relay contact arrangement used by this actor.

  EventType:
    $ref: "https://schemas.electricity.works/formats/left.right.dot"
    description: >
      Semantic event category emitted when the relay changes the controlled
      actor's state.

  DeEnergizingEvent:
    $ref: "https://schemas.electricity.works/formats/non.empty.string"
    description: >
      Event value associated with transition caused by relay de-energization.

  EnergizingEvent:
    $ref: "https://schemas.electricity.works/formats/non.empty.string"
    description: >
      Event value associated with transition caused by relay energization.

  StateType:
    $ref: "https://schemas.electricity.works/formats/left.right.dot"
    description: >
      Semantic state category controlled by this relay.

  DeEnergizedState:
    $ref: "https://schemas.electricity.works/formats/non.empty.string"
    description: >
      State value associated with the de-energized relay position.

  EnergizedState:
    $ref: "https://schemas.electricity.works/formats/non.empty.string"
    description: >
      State value associated with the energized relay position.

  TypeName:
    const: "relay.actor.config"

  Version:
    const: "002"

required:
  - ChannelName
  - CapturePeriodS
  - AsyncCapture
  - Exponent
  - Unit
  - RelayIdx
  - ActorName
  - WiringConfig
  - EventType
  - DeEnergizingEvent
  - EnergizingEvent
  - StateType
  - DeEnergizedState
  - EnergizedState
  - TypeName
  - Version

additionalProperties: false

examples:
  - |
    {
      "ActorName": "relay17",
      "AsyncCapture": true,
      "CapturePeriodS": 300,
      "ChannelName": "zone1-down-failsafe-relay17",
      "DeEnergizedState": "WallThermostat",
      "DeEnergizingEvent": "SwitchToWallThermostat",
      "EnergizedState": "Scada",
      "EnergizingEvent": "SwitchToScada",
      "EventType": "change.heatcall.source",
      "Exponent": 0,
      "PollPeriodMs": 200,
      "RelayIdx": 17,
      "WiringConfig": "DoubleThrow",
      "Unit": "Unitless",
      "StateType": "heatcall.source",
      "TypeName": "relay.actor.config",
      "Version": "002"
    }

x-gridworks:
  owner: "gridworks-energy"

  axioms:
    - number: 1
      name: "EventEnumConsistency"
      statement: >
        If EventType names a known enum, then DeEnergizingEvent and
        EnergizingEvent SHALL both be valid values of that enum.

    - number: 2
      name: "StateEnumConsistency"
      statement: >
        If StateType names a known enum, then DeEnergizedState and
        EnergizedState SHALL both be valid values of that enum.

    - number: 3
      name: "EventStateSemanticMatch"
      statement: >
        EnergizingEvent and DeEnergizingEvent SHALL correspond semantically to
        transitions into EnergizedState and DeEnergizedState respectively.

    - number: 4
      name: "ClosedOpenWiringConsistency"
      statement: >
        If:

          - StateType equals "relay.closed.or.open"
          - EventType equals "change.relay.state"
          - WiringConfig equals "NormallyClosed"

        then:

          - DeEnergizedState SHALL equal "RelayClosed"
          - DeEnergizingEvent SHALL equal "CloseRelay"
          - EnergizedState SHALL equal "RelayOpen"
          - EnergizingEvent SHALL equal "OpenRelay"

        If:

          - StateType equals "relay.closed.or.open"
          - EventType equals "change.relay.state"
          - WiringConfig equals "NormallyOpen"

        then:

          - DeEnergizedState SHALL equal "RelayOpen"
          - DeEnergizingEvent SHALL equal "OpenRelay"
          - EnergizedState SHALL equal "RelayClosed"
          - EnergizingEvent SHALL equal "CloseRelay"

  extended_description: >
    relay.actor.config specializes generic channel capture configuration for
    relay-backed actors in hydronic control systems.

    This type binds one relay position on a relay board to a specific actor and
    declares the event/state semantics associated with switching that relay.
    These semantics are important for distributed coordination because different
    layouts may realize the same functional role using different underlying
    hardware node names, while preserving identical actor-level meaning.

    Typical uses include selecting the source of a heat call, enabling or
    disabling control authority, or switching physical flow or heating elements
    between named operating states.
