$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "https://schemas.electricity.works/types/i2c.multichannel.dt.relay.component.gt/002"

title: "i2c.multichannel.dt.relay.component.gt"
type: object
description: >
  Configuration for a multi-channel I2C relay component used by Spaceheat SCADA.

  This includes relay-actor configuration fields specific to the I2C relay board.

properties:
  ComponentId:
    $ref: "https://schemas.electricity.works/formats/uuid4.str"

  ComponentAttributeClassId:
    $ref: "https://schemas.electricity.works/formats/uuid4.str"

  ConfigList:
    type: array
    items:
      $ref: "https://schemas.electricity.works/types/relay.actor.config/002"

  DisplayName:
    type: string

  HwUid:
    type: string

  I2cAddressList:
    type: array
    items:
      type: integer

  TypeName:
    const: "i2c.multichannel.dt.relay.component.gt"

  Version:
    const: "002"

required:
  - ComponentId
  - ComponentAttributeClassId
  - ConfigList
  - I2cAddressList
  - TypeName
  - Version

additionalProperties: true

examples:
  - |
    {
      "ComponentId": "25f344ee-39ea-4904-bff9-54f2022337af",
      "ComponentAttributeClassId": "29eab8b1-100f-4230-bb44-3a2fcba33cc3",
      "ConfigList": [
        {
          "ActorName": "relay1",
          "AsyncCapture": true,
          "AsyncCaptureDelta": null,
          "CapturePeriodS": 300,
          "ChannelName": "vdc-relay1",
          "DeEnergizedState": "RelayClosed",
          "DeEnergizingEvent": "CloseRelay",
          "EnergizedState": "RelayOpen",
          "EnergizingEvent": "OpenRelay",
          "EventType": "change.relay.state",
          "Exponent": 0,
          "PollPeriodMs": 200,
          "RelayIdx": 1,
          "StateType": "relay.closed.or.open",
          "TypeName": "relay.actor.config",
          "Unit": "Unitless",
          "Version": "002",
          "WiringConfig": "NormallyClosed"
        }
      ],
      "DisplayName": "I2C Relay Board",
      "HwUid": "i2c.krida.double.emr16.v1.29eab8",
      "I2cAddressList": [
        32,
        33
      ],
      "TypeName": "i2c.multichannel.dt.relay.component.gt",
      "Version": "002"
    }

x-gridworks:
  owner: "gridworks-energy"

  axioms:
    - number: 1
      name: "ActorAndRelayIndexUniqueness"
      statement: >
        ConfigList SHALL NOT contain duplicate ActorName values or duplicate
        RelayIdx values.
