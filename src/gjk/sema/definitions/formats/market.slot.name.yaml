$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "https://schemas.electricity.works/formats/market.slot.name"

title: "market.slot.name"
description: >
  Dot-separated identifier for a specific market slot, maker-agnostic by design.

  Four parts: the first segment is the market commodity class and MUST be one of
  `e`, `r`, or `d`; the second segment is the market-product name token and MUST
  match the single-token spaceheat.name shape (lowercase, starting with a
  letter, internal hyphens allowed, no dots); the middle segments are the market
  maker alias and MUST satisfy the left-right-dot shape; the final segment is a
  10-digit Unix timestamp in seconds giving the slot start, which MUST be
  divisible by 300 — every market slot starts on a 5-minute grid (a GridWorks
  ecosystem invariant; arithmetic, so enforced by the validator rather than the
  pattern).

  Beyond that grid invariant the format is maker-agnostic: whether the product
  token names a real product, and whether the slot start aligns to that
  product's specific slot duration, are the receiving market maker's concern —
  decoded opt-in against that maker's product-name enum (e.g.
  gw.market.product.name). Keeping the rest maker-agnostic lets bid and
  latest.price stay uniform across market makers.

type: string
pattern: "^[erd]\\.[a-z][a-z0-9]*(?:-[a-z0-9]+)*\\.[a-z][a-z0-9]*(?:\\.[a-z0-9]+)*\\.[0-9]{10}$"

examples:
  - "e.rt60gate5.d1.isone.ver.keene.1673539200"
  - "e.rt-60-gate5.d1.isone.ver.keene.1673539200"

counterexamples:
  - "rt60gate5.d1.isone.ver.keene.1673539200"
  - "x.rt60gate5.d1.isone.1673539200"
  - "e.RT60.d1.isone.1673539200"
  - "e.rt60gate5.d1.isone.167353920"

x-gridworks:
  owner: "gridworks-energy"
