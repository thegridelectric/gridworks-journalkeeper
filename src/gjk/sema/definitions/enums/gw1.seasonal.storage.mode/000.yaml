$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "https://schemas.electricity.works/enums/gw1.seasonal.storage.mode/000"

title: "gw1.seasonal.storage.mode"
type: "string"
description: >
  Seasonal storage operating mode for layouts that distinguish between
  all-tank operation and buffer-only operation.

enum:
  - "AllTanks"
  - "BufferOnly"

default: "AllTanks"

x-gridworks:
  owner: "gridworks-energy"
  version: "000"
  value_descriptions:
    "AllTanks": >
      Operate using the full seasonal storage tank set.
    "BufferOnly": >
      Operate using only the buffer tank.
