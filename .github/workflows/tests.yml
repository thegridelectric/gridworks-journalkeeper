name: Tests

on:
  push:
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest

    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Cache uv
        uses: actions/cache@v6
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-${{ hashFiles('uv.lock') }}

      - name: Start World Broker
        uses: namoshek/rabbitmq-github-action@v1
        with:
          version: "3.9.13"
          ports: "1885:1885 4369:4369 5672:5672 15672:15672 15674:15674 25672:25672"
          config: ${{ github.workspace }}/.ci/rabbitmq.conf
          container-name: "rabbit"

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Sync dependencies (uv-native; replaces the old `make venv` / `make dev`)
        # `--all-extras` picks up pytest etc. from [project.optional-dependencies];
        # `--all-groups` covers [dependency-groups]. gjk's pyproject uses both.
        run: uv sync --all-extras --all-groups --locked

      - name: Run tests
        run: uv run pytest tests/
